<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E63946">
  <title>AutoCode Maroc - منصة مدارس السياقة</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root { --primary: #E63946; --success: #22c55e; --danger: #ef4444; }
    body { font-family: system-ui, sans-serif; margin:0; background:#f8fafc; color:#1f2937; }
    header { background:var(--primary); color:white; padding:20px; text-align:center; position:sticky; top:0; z-index:100; }
    .container { max-width:1100px; margin:auto; padding:15px; }
    .card { background:white; border-radius:20px; padding:25px; margin:20px 0; box-shadow:0 10px 30px rgba(0,0,0,0.1); }
    .btn { padding:15px 28px; background:var(--primary); color:white; border:none; border-radius:12px; cursor:pointer; font-size:17px; font-weight:bold; margin:8px 0; width:100%; }
    .btn-small { width:auto; padding:10px 20px; font-size:15px; }
    .quiz-option { padding:18px; margin:12px 0; background:#f1f5f9; border-radius:12px; border:2px solid #e2e8f0; cursor:pointer; font-size:17px; }
    .correct { background:var(--success)!important; color:white; }
    .wrong { background:var(--danger)!important; color:white; }
    input, select, textarea { width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:8px; }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <header>
    <h1>🚗 AutoCode Maroc</h1>
    <p>المنصة الذكية لمدارس تعليم السياقة</p>
  </header>

  <div class="container">

    <!-- تسجيل الدخول -->
    <div id="loginScreen" class="card">
      <h2>تسجيل الدخول</h2>
      <input type="text" id="username" placeholder="اسم المستخدم" value="admin">
      <input type="password" id="password" placeholder="كلمة المرور" value="123456">
      <button class="btn" onclick="login()">دخول</button>
      <p style="text-align:center; margin-top:15px; color:#666; font-size:14px;">
        Admin: <strong>admin / 123456</strong><br>
        مدرسة: <strong>school / 123456</strong>
      </p>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="mainApp" class="hidden">
      <div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:15px 0;">
        <button class="btn btn-small" onclick="showSection('home')">🏠 الرئيسية</button>
        <button class="btn btn-small" onclick="startFullQuiz()">📝 اختبار</button>
        <button class="btn btn-small" onclick="showAdmin()">⚙️ إدارة الأسئلة</button>
        <button class="btn btn-small" onclick="showSchoolDashboard()">🏫 لوحة المدرسة</button>
        <button class="btn btn-small" onclick="showWrongAnswers()">🔄 الأخطاء</button>
        <button class="btn btn-small" onclick="logout()">خروج</button>
      </div>

      <!-- الرئيسية -->
      <div id="home" class="card">
        <h2>مرحبا بك في AutoCode Maroc</h2>
        <button class="btn" onclick="startFullQuiz()">ابدأ الاختبار (300 سؤال)</button>
      </div>

      <!-- لوحة تحكم المدرسة -->
      <div id="schoolDashboard" class="card hidden">
        <h2>🏫 لوحة تحكم المدرسة</h2>
        <button class="btn" onclick="addStudent()">+ إضافة تلميذ</button>
        <div id="studentsList"></div>
      </div>

      <!-- إدارة الأسئلة -->
      <div id="admin" class="card hidden">
        <h2>⚙️ إدارة الأسئلة</h2>
        <button class="btn" onclick="addNewQuestion()">+ إضافة سؤال جديد</button>
        <div id="questionsList"></div>
      </div>

      <!-- نموذج السؤال -->
      <div id="questionForm" class="card hidden">
        <h2 id="formTitle">إضافة سؤال</h2>
        <input type="text" id="qText" placeholder="نص السؤال">
        <input type="text" id="opt1" placeholder="الخيار 1">
        <input type="text" id="opt2" placeholder="الخيار 2">
        <input type="text" id="opt3" placeholder="الخيار 3">
        <input type="text" id="opt4" placeholder="الخيار 4">
        <select id="correctAnswer">
          <option value="0">الخيار 1</option>
          <option value="1">الخيار 2</option>
          <option value="2">الخيار 3</option>
          <option value="3">الخيار 4</option>
        </select>
        <button class="btn" onclick="saveQuestion()">حفظ السؤال</button>
        <button class="btn" onclick="cancelForm()">إلغاء</button>
      </div>

      <!-- الاختبار -->
      <div id="quiz" class="card hidden">
        <div style="font-weight:bold;color:var(--primary);">سؤال <span id="qNum">1</span> / 300</div>
        <div style="height:10px;background:#ddd;margin:12px 0;border-radius:9999px;">
          <div id="progressBar" style="height:100%;background:linear-gradient(to right,#E63946,#f59e0b);width:0%;"></div>
        </div>
        <h3 id="question" style="margin:20px 0;font-size:19px;line-height:1.6;"></h3>
        <div id="options"></div>
        <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">السؤال التالي →</button>
        <p id="feedback" style="margin-top:15px;font-size:18px;"></p>
      </div>

      <!-- النتائج -->
      <div id="results" class="card hidden" style="text-align:center;">
        <h2>🎉 انتهى الاختبار!</h2>
        <p id="scoreFinal" style="font-size:52px;font-weight:bold;"></p>
        <button class="btn" onclick="showWrongAnswers()">مراجعة الأخطاء</button>
        <button class="btn" onclick="startFullQuiz()">اختبار جديد</button>
      </div>

      <!-- الأخطاء -->
      <div id="wrongPage" class="card hidden">
        <h2>الأخطاء المحفوظة (<span id="wrongCount">0</span>)</h2>
        <div id="wrongList" style="max-height:60vh;overflow-y:auto;"></div>
        <button class="btn" onclick="clearWrong()">مسح كل الأخطاء</button>
      </div>
    </div>
  </div>

  <script>
    // بيانات
    let allQuestions = JSON.parse(localStorage.getItem('tinghir_questions')) || [];
    if (allQuestions.length === 0) {
      allQuestions = Array.from({length: 300}, (_, i) => ({
        q: `سؤال ${i+1}: ما هي القاعدة الصحيحة حسب مدونة السير 52.05؟`,
        options: ["خيار خاطئ A", "خيار خاطئ B", "الإجابة الصحيحة", "خيار خاطئ D"],
        answer: 2
      }));
      localStorage.setItem('tinghir_questions', JSON.stringify(allQuestions));
    }

    let students = JSON.parse(localStorage.getItem('tinghir_students')) || [];
    let wrongBank = JSON.parse(localStorage.getItem('tinghir_wrong')) || [];
    let currentQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let editingIndex = -1;
    let currentUser = null;

    // تسجيل الدخول
    function login() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      if ((user === "admin" && pass === "123456") || (user === "school" && pass === "123456")) {
        currentUser = user;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        showSection('home');
      } else {
        alert("بيانات الدخول خاطئة");
      }
    }

    function logout() {
      if (confirm("تسجيل الخروج؟")) location.reload();
    }

    function showSection(id) {
      document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    function startFullQuiz() {
      currentQuestions = allQuestions;
      currentIdx = 0;
      score = 0;
      showSection('quiz');
      loadQuestion();
    }

    function loadQuestion() {
      const q = currentQuestions[currentIdx];
      document.getElementById('qNum').textContent = currentIdx + 1;
      document.getElementById('question').textContent = q.q;
      document.getElementById('progressBar').style.width = `${(currentIdx / 300) * 100}%`;

      let html = '';
      q.options.forEach((opt, i) => {
        html += `<div class="quiz-option" onclick="selectAnswer(${i})">${opt}</div>`;
      });
      document.getElementById('options').innerHTML = html;
      document.getElementById('nextBtn').style.display = 'none';
      document.getElementById('feedback').innerHTML = '';
    }

    function selectAnswer(selected) {
      const q = currentQuestions[currentIdx];
      const opts = document.querySelectorAll('.quiz-option');
      opts.forEach((el, i) => {
        if (i === q.answer) el.classList.add('correct');
        if (i === selected && i !== q.answer) el.classList.add('wrong');
      });

      if (selected !== q.answer) {
        wrongBank.push(q);
        localStorage.setItem('tinghir_wrong', JSON.stringify(wrongBank));
      }
      if (selected === q.answer) score++;

      document.getElementById('feedback').innerHTML = selected === q.answer ? `✅ صحيح` : `❌ الصحيح: ${q.options[q.answer]}`;
      document.getElementById('nextBtn').style.display = 'block';
    }

    function nextQuestion() {
      currentIdx++;
      if (currentIdx < currentQuestions.length) loadQuestion();
      else showResults();
    }

    function showResults() {
      const perc = Math.round((score / 300) * 100);
      document.getElementById('scoreFinal').innerHTML = `${score} / 300<br><small>${perc}%</small>`;
      showSection('results');
    }

    // إدارة الأسئلة
    function showAdmin() {
      showSection('admin');
      renderQuestionsList();
    }

    function renderQuestionsList() {
      const list = document.getElementById('questionsList');
      list.innerHTML = allQuestions.map((q, i) => `
        <div class="card">
          <strong>${i+1}.</strong> ${q.q.substring(0,80)}...<br><br>
          <button class="btn btn-small" onclick="editQuestion(${i})" style="background:#3b82f6;">تعديل</button>
          <button class="btn btn-small" onclick="deleteQuestion(${i})" style="background:#ef4444;">حذف</button>
        </div>
      `).join('');
    }

    function addNewQuestion() {
      editingIndex = -1;
      document.getElementById('formTitle').textContent = "إضافة سؤال جديد";
      document.getElementById('qText').value = '';
      document.getElementById('opt1').value = '';
      document.getElementById('opt2').value = '';
      document.getElementById('opt3').value = '';
      document.getElementById('opt4').value = '';
      document.getElementById('correctAnswer').value = 0;
      showSection('questionForm');
    }

    function editQuestion(i) {
      editingIndex = i;
      const q = allQuestions[i];
      document.getElementById('formTitle').textContent = "تعديل السؤال";
      document.getElementById('qText').value = q.q;
      document.getElementById('opt1').value = q.options[0];
      document.getElementById('opt2').value = q.options[1];
      document.getElementById('opt3').value = q.options[2];
      document.getElementById('opt4').value = q.options[3];
      document.getElementById('correctAnswer').value = q.answer;
      showSection('questionForm');
    }

    function saveQuestion() {
      const qText = document.getElementById('qText').value.trim();
      if (!qText) return alert("أدخل نص السؤال");

      const options = [
        document.getElementById('opt1').value.trim(),
        document.getElementById('opt2').value.trim(),
        document.getElementById('opt3').value.trim(),
        document.getElementById('opt4').value.trim()
      ];

      const answer = parseInt(document.getElementById('correctAnswer').value);

      if (editingIndex === -1) {
        allQuestions.push({q: qText, options, answer});
      } else {
        allQuestions[editingIndex] = {q: qText, options, answer};
      }

      localStorage.setItem('tinghir_questions', JSON.stringify(allQuestions));
      alert("✅ تم حفظ السؤال");
      showAdmin();
    }

    function deleteQuestion(i) {
      if (confirm("حذف هذا السؤال؟")) {
        allQuestions.splice(i, 1);
        localStorage.setItem('tinghir_questions', JSON.stringify(allQuestions));
        renderQuestionsList();
      }
    }

    function cancelForm() {
      showAdmin();
    }

    // لوحة المدرسة
    function showSchoolDashboard() {
      showSection('schoolDashboard');
      renderStudents();
    }

    function addStudent() {
      const name = prompt("اسم التلميذ:");
      if (name) {
        students.push({name, progress: 0, score: 0});
        localStorage.setItem('tinghir_students', JSON.stringify(students));
        renderStudents();
      }
    }

    function renderStudents() {
      const list = document.getElementById('studentsList');
      list.innerHTML = students.map(s => `<div class="card">👤 ${s.name} - تقدم: ${s.progress}%</div>`).join('');
    }

    function showWrongAnswers() {
      const list = document.getElementById('wrongList');
      list.innerHTML = '';
      document.getElementById('wrongCount').textContent = wrongBank.length;
      wrongBank.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<strong>${i+1}.</strong> ${q.q}<br><br><span style="color:var(--danger)">الصحيح: ${q.options[q.answer]}</span>`;
        list.appendChild(div);
      });
      showSection('wrongPage');
    }

    function clearWrong() {
      if (confirm("مسح كل الأخطاء؟")) {
        wrongBank = [];
        localStorage.removeItem('tinghir_wrong');
        showWrongAnswers();
      }
    }

    // بداية التطبيق
    showSection('loginScreen');
  </script>
</body>
</html>
