        }

        }

        }

        .stats span {

        }

            font-size: 0.85rem;
            font-weight: bold;

            background: #ff6b35;

        }

            padding: 0.4rem;

            color: #ff6b35;

            color: #cc5500;

            color: #ff6b35;

            color: #6c757d;
            font-size: 0.75rem;

                display: block;
                padding: 0;

                padding: 0;
            }

                padding: 0.5rem 0.8rem;
                font-size: 0.75rem;
            }
            .stats {
                flex-direction: column;
                gap: 0.3rem;
            }

            background-color: #ffeb3b;

            color: #1a2a3a;

</head>

                    <ul><li>مدة 3 سنوات (أو سنتين للمتميزين).</li><li>رصيد النقط: 8 نقاط.</li><li>السرعة القصوى أقل بـ 10-20 كلم/س.</li><li>نسبة الكحول أقل (0.2 غ/ل).</li></ul>
                    <h4>📈 نظام النقط (Permis à points)</h4>
                    <ul><li>الرصيد العادي: 12 نقطة.</li><li>يتم خصم النقط عند ارتكاب مخالفات (سرعة، تجاوز ممنوع، هاتف...).</li><li>يمكن استرجاع النقط بتكوين إضافي أو بمرور الوقت دون مخالفات.</li></ul>
                `}
            ]
        },
        {
            id: "module10", title: "الوحدة 10: البيئة والاقتصاد في الوقود",
            subModules: [
                { title: "السياقة البيئية (Éco-conduite)", content: `
                    <h4>🌱 نصائح لتوفير الوقود وتقليل التلوث</h4>
                    <div class="signs-grid">
                        <div class="sign-card"><div class="sign-symbol">🚗💨</div><div class="sign-desc">تجنب التسارع والفرملة المفاجئة</div></div>
                        <div class="sign-card"><div class="sign-symbol">⚙️⬆️</div><div class="sign-desc">استخدم العتاد العالي مبكراً (لتقليل استهلاك المحرك)</div></div>
                        <div class="sign-card"><div class="sign-symbol">🔄💨</div><div class="sign-desc">حافظ على سرعة ثابتة (استعمل مثبت السرعة فالأوتوروت)</div></div>
                        <div class="sign-card"><div class="sign-symbol">⏱️🛑</div><div class="sign-desc">أطفئ المحرك في التوقفات الطويلة (أكثر من دقيقة)</div></div>
                        <div class="sign-card"><div class="sign-symbol">🛞⬆️</div><div class="sign-desc">تأكد من ضغط العجلات (العجلات المنخفضة تزيد الاستهلاك)</div></div>
                        <div class="sign-card"><div class="sign-symbol">🎒❌</div><div class="sign-desc">أزل الحمولة غير الضرورية</div></div>
                        <div class="sign-card"><div class="sign-symbol">🚌🚲</div><div class="sign-desc">استعمل وسائل النقل الجماعي أو الدراجات كلما أمكن</div></div>
                    </div>
                `}
            ]
        }
    ];

    function buildSidebar() {
        const sidebar = document.getElementById('sidebarList');
        sidebar.innerHTML = '';
        modulesData.forEach(m => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="#${m.id}" class="module-link">📌 ${m.title}</a>`;
            sidebar.appendChild(li);
            m.subModules.forEach(s => {
                const subId = `${m.id}_${s.title.replace(/\s/g, '_')}`;
                const subLi = document.createElement('li');
                subLi.innerHTML = `<a href="#${subId}" style="padding-right: 1.2rem;">▫️ ${s.title}</a>`;
                sidebar.appendChild(subLi);
            });
        });
    }

    function buildContent() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '';
        modulesData.forEach(m => {
            const modDiv = document.createElement('div'); modDiv.className = 'module'; modDiv.id = m.id;
            modDiv.innerHTML = `<h2 class="module-title">${m.title}</h2>`;
            m.subModules.forEach(s => {
                const subId = `${m.id}_${s.title.replace(/\s/g, '_')}`;
                const subDiv = document.createElement('div'); subDiv.className = 'sub-module'; subDiv.id = subId;
                subDiv.innerHTML = `<h3 class="sub-title">📖 ${s.title}</h3><div class="lesson-content">${s.content}</div>`;
                modDiv.appendChild(subDiv);
            });
            main.appendChild(modDiv);
        });
    }

    function setupSearch() {
        const input = document.getElementById('searchInput');
        input.addEventListener('input', function() {
            const term = this.value.trim().toLowerCase();
            const all = document.querySelectorAll('.sub-module');
            if (!term) { all.forEach(s => s.style.display = ''); return; }
            all.forEach(s => { s.style.display = s.innerText.toLowerCase().includes(term) ? '' : 'none'; });
        });
    }

    function setupFont() {
        let size = 16;
        const content = document.querySelector('.content');
        document.getElementById('fontPlus').onclick = () => { size = Math.min(size+2, 28); content.style.fontSize = size+'px'; };
        document.getElementById('fontMinus').onclick = () => { size = Math.max(size-2, 12); content.style.fontSize = size+'px'; };
    }

    function setupDarkMode() {
        const btn = document.getElementById('darkModeToggle');
        btn.onclick = () => {
            document.body.classList.toggle('dark-mode');
            btn.textContent = document.body.classList.contains('dark-mode') ? '☀️ النهاري' : '🌙 الليلي';
        };
    }

    buildSidebar();
    buildContent();
    setupSearch();
    setupFont();
    setupDarkMode();
</script>
</body>
</html>
